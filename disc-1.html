<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISC Personality System</title>
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; }
        .modal-enter { animation: fadeIn 0.2s ease-out, zoomIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); } to { transform: scale(1); } }
        
        .hidden { display: none !important; }
        
        button { cursor: pointer; transition: all 0.2s; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }

        .input-active:not(:placeholder-shown),
        .input-active:focus {
            background-color: #0038a8 !important; 
            color: white !important;
            font-weight: bold;
            border-color: white !important;
            outline: none;
        }

        #messageBox {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        #globalLoader {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .keypad-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #1e293b;
            transition: all 0.1s;
        }
        .keypad-btn:active {
            background: #e2e8f0;
            transform: scale(0.95);
        }

        /* ปุ่มยกเลิก สีเทา 35% */
        .btn-cancel-gray {
            background-color: #A6A6A6;
            color: white;
        }
        .btn-cancel-gray:hover {
            background-color: #8c8c8c;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center m-0 p-0 text-gray-800">

    <!-- Loading Overlay -->
    <div id="globalLoader">
        <div id="loaderIcon" class="w-10 h-10 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-6"></div>
    </div>

    <div id="messageBox" class="hidden"></div>

    <!-- แถบสีบน (Fixed) -->
    <div class="fixed top-0 left-0 right-0 h-[13px] flex z-[60]">
        <div class="flex-1 bg-green-600"></div>
        <div class="flex-1 bg-red-500"></div>
        <div class="flex-1 bg-cyan-500"></div>
        <div class="flex-1 bg-yellow-500"></div>
    </div>

    <!-- แถบสีล่าง (Fixed) -->
    <div class="fixed bottom-0 left-0 right-0 h-[13px] flex z-[60]">
        <div class="flex-1 bg-green-600"></div>
        <div class="flex-1 bg-red-500"></div>
        <div class="flex-1 bg-cyan-500"></div>
        <div class="flex-1 bg-yellow-500"></div>
    </div>

    <!-- หน้า Landing -->
    <div id="landingPage" class="w-full max-w-[500px] flex flex-col items-center bg-white min-h-screen pt-[13px] pb-[13px] hidden">
        <div class="relative w-[80%] mt-[60px] select-none mx-auto">
            <img src="https://firebasestorage.googleapis.com/v0/b/faifah-ttb.appspot.com/o/disc%2Fdisc.jpg?alt=media&token=328a617d-07b1-419b-bc5d-00a85dc455e2" 
                 alt="DISC Chart" class="w-full h-auto block rounded-lg shadow-sm">
        </div>

        <div class="w-full px-8 py-6 flex flex-col items-center space-y-5">
            <button id="openModalBtn" class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white text-[14px] font-normal py-4 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md active:scale-[0.97]">
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <span>ลงทะเบียน / เข้าสู่ระบบ</span>
            </button>
            <p class="text-[12px] text-gray-400 text-center leading-relaxed">
                กรุณาลงทะเบียนเพื่อบันทึกข้อมูล
            </p>
        </div>

        <div class="mt-auto mb-8 text-center text-gray-300 text-[10px] uppercase tracking-[0.3em] font-bold">
            DISC PERSONALITY NAVIGATOR
        </div>
    </div>

    <!-- หน้าหลัก DISC เมื่อสำเร็จ -->
    <div id="mainDiscPage" class="w-full max-w-[500px] flex flex-col items-center bg-white min-h-screen pt-[13px] pb-[13px] hidden">
        <div class="w-full px-8 pt-10 flex justify-between items-center border-b pb-4">
            <div>
                <h1 id="welcomeUser" class="text-xl font-bold text-slate-800 tracking-tight">สวัสดีครับ</h1>
                <p id="userSub" class="text-xs text-slate-400"></p>
            </div>
            <button id="logoutBtn" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="relative w-[85%] mt-10 mx-auto">
            <img src="https://firebasestorage.googleapis.com/v0/b/faifah-ttb.appspot.com/o/disc%2Fdisc.jpg?alt=media&token=328a617d-07b1-419b-bc5d-00a85dc455e2" 
                 alt="DISC Main" class="w-full h-auto block rounded-2xl shadow-xl">
        </div>

        <div class="mt-auto mb-10 text-center space-y-2">
            <div class="text-[10px] text-slate-300 uppercase tracking-widest">เข้าใช้งานครั้งที่: <span id="loginCountDisplay" class="font-bold text-blue-500">0</span></div>
            <div class="text-[10px] text-slate-300 uppercase tracking-[0.3em] font-bold">READY FOR ASSESSMENT</div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="regModalBackdrop" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white w-full max-w-[450px] rounded-[12px] shadow-2xl overflow-hidden modal-enter relative" onclick="event.stopPropagation()">
            <div class="bg-[#0056ff] px-8 py-5">
                <div class="flex justify-between items-center">
                    <h2 class="text-[16px] font-bold text-white uppercase tracking-tight">ลงทะเบียน / เข้าสู่ระบบ</h2>
                    <button id="closeModalIconBtn" class="text-white/80 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            
            <div class="p-8">
                <!-- Step 1: Employee ID -->
                <div id="stepEmployeeId" class="space-y-6">
                    <div class="space-y-2 text-center">
                        <label class="text-[12px] font-semibold text-slate-500 uppercase tracking-wider">ระบุรหัสพนักงาน 5 หลัก</label>
                        <input type="text" id="EmpID" maxlength="5" inputmode="numeric" placeholder="xxxxx" class="input-active w-full px-4 py-3.5 bg-blue-50 border-2 border-white rounded-xl text-[18px] font-bold text-center shadow-sm">
                    </div>
                    <div class="flex gap-3">
                        <button id="cancelBtn" class="flex-1 btn-cancel-gray text-white text-[14px] py-2.5 rounded-xl font-bold">ยกเลิก</button>
                        <button id="submitIdBtn" disabled class="flex-1 bg-blue-600 text-white text-[14px] py-2.5 rounded-xl flex items-center justify-center gap-2 transition-all font-bold">
                            <span id="submitIdText">ถัดไป</span>
                            <div id="submitIdLoader" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        </button>
                    </div>
                </div>

                <!-- Step 2: New Registration Setup -->
                <div id="stepSetupProfile" class="hidden space-y-6">
                    <div class="bg-blue-50 p-4 rounded-xl space-y-1 text-sm border border-blue-100 shadow-inner">
                        <div class="flex justify-between border-b border-blue-200 pb-1 mb-1"><span class="text-slate-400 text-xs font-medium">ชื่อ-นามสกุล:</span><span id="dispName" class="font-bold text-blue-700 text-right"></span></div>
                        <div class="flex justify-between border-b border-blue-200 pb-1 mb-1"><span class="text-slate-400 text-xs font-medium">กลุ่มงาน:</span><span id="dispGroup" class="font-medium text-slate-700 text-right"></span></div>
                        <div class="flex justify-between"><span class="text-slate-400 text-xs font-medium">หน่วยงาน:</span><span id="dispSubGroup" class="text-slate-600 text-right"></span></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">กำหนด PIN (6 หลัก)</label>
                            <input type="password" id="setPin" maxlength="6" inputmode="numeric" placeholder="••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl tracking-[0.2em] outline-none focus:ring-2 focus:ring-blue-500/20">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider ml-1">ยืนยัน PIN</label>
                            <input type="password" id="confirmPin" maxlength="6" inputmode="numeric" placeholder="••••••" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-center text-xl tracking-[0.2em] outline-none focus:ring-2 focus:ring-blue-500/20">
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button id="cancelSetupBtn" class="flex-1 btn-cancel-gray text-white py-2.5 rounded-xl font-bold text-[14px]">ยกเลิก</button>
                        <button id="confirmRegBtn" disabled class="flex-[2] bg-green-600 text-white text-[14px] py-2.5 rounded-xl font-bold shadow-lg hover:bg-green-700 transition-all disabled:opacity-50">สร้างบัญชีและเข้าใช้งาน</button>
                    </div>
                </div>

                <!-- Step 3: Login Verification (Numeric Keypad) -->
                <div id="stepEnterPinKeypad" class="hidden space-y-6">
                    <div class="text-center space-y-3">
                        <p class="text-[14px] text-slate-600 font-medium leading-tight text-center">ยืนยันรหัส PIN, <br><span id="loginUserName" class="text-lg font-bold text-blue-700"></span></p>
                        <div id="pinDisplay" class="flex justify-center gap-2 mb-2">
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-0"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-1"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-2"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-3"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-4"></div>
                            <div class="w-4 h-4 rounded-full border-2 border-slate-200" id="dot-5"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-3 max-w-[320px] mx-auto">
                        <button class="keypad-btn" onclick="pressKey('1')">1</button>
                        <button class="keypad-btn" onclick="pressKey('2')">2</button>
                        <button class="keypad-btn" onclick="pressKey('3')">3</button>
                        <button class="keypad-btn" onclick="pressKey('4')">4</button>
                        <button class="keypad-btn" onclick="pressKey('5')">5</button>
                        <button class="keypad-btn" onclick="pressKey('6')">6</button>
                        <button class="keypad-btn" onclick="pressKey('7')">7</button>
                        <button class="keypad-btn" onclick="pressKey('8')">8</button>
                        <button class="keypad-btn" onclick="pressKey('9')">9</button>
                        <button class="keypad-btn text-slate-400" onclick="pressKey('del')"><i data-lucide="delete" class="w-6 h-6 mx-auto"></i></button>
                        <button class="keypad-btn" onclick="pressKey('0')">0</button>
                        <button class="keypad-btn text-red-500" onclick="pressKey('clear')">C</button>
                    </div>

                    <div class="flex gap-3 pt-2">
                        <button id="closeKeypadBtn" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">ปิดหน้าต่าง</button>
                        <button id="savePinLoginBtn" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-colors">บันทึกข้อมูล</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAciknEYhZU7AwOdfYytC1t_AnW2Ee11us",
            authDomain: "faifah-ttb.firebaseapp.com",
            projectId: "faifah-ttb",
            storageBucket: "faifah-ttb.appspot.com",
            messagingSenderId: "842980876200",
            appId: "1:842980876200:web:f33bfad2ccbf263075079d"
        };

        const COLLECTION_NAME = "DISC_Member";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isAuthReady = false;
        let currentMember = null;
        let userIP = "";
        let inputPinValue = "";

        // --- IP Detection ---
        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) { userIP = "unknown"; }
        }

        // --- UI Helpers ---
        const showMessage = (text, type = 'success') => {
            const msgBox = document.getElementById('messageBox');
            if (!msgBox) return;
            msgBox.textContent = text;
            msgBox.className = `fixed top-10 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl shadow-lg font-medium transition-all duration-300 ${
                type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
            }`;
            msgBox.classList.remove('hidden', 'opacity-0');
            setTimeout(() => {
                msgBox.classList.add('opacity-0');
                setTimeout(() => msgBox.classList.add('hidden'), 300);
            }, 3000);
        };

        const showMainPage = (user) => {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('mainDiscPage').classList.remove('hidden');
            const welcome = document.getElementById('welcomeUser');
            if (welcome) welcome.textContent = `สวัสดีครับ, ${user.FullName || 'พนักงาน'}`;
            const sub = document.getElementById('userSub');
            if (sub) sub.textContent = `${user.Group || '-'} | ${user.SubGroup || '-'}`;
            const count = document.getElementById('loginCountDisplay');
            if (count) count.textContent = user.Times || 1;
            closeRegModal();
            lucide.createIcons();
        };

        const closeRegModal = () => {
            document.getElementById('regModalBackdrop').classList.add('hidden');
            inputPinValue = "";
            updatePinDots();
        };

        const updatePinDots = () => {
            for(let i=0; i<6; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (dot) {
                    if (i < inputPinValue.length) {
                        dot.className = "w-4 h-4 rounded-full bg-blue-600 border-2 border-blue-600 shadow-sm";
                    } else {
                        dot.className = "w-4 h-4 rounded-full border-2 border-slate-200";
                    }
                }
            }
        };

        window.pressKey = (key) => {
            if (key === 'del') {
                inputPinValue = inputPinValue.slice(0, -1);
            } else if (key === 'clear') {
                inputPinValue = "";
            } else {
                if (inputPinValue.length < 6) inputPinValue += key;
            }
            updatePinDots();
        };

        // --- Core Logic ---
        const handleIdSubmission = async () => {
            const empIdInputVal = document.getElementById('EmpID').value.trim();
            if (empIdInputVal.length !== 5) return;

            const btn = document.getElementById('submitIdBtn');
            const text = document.getElementById('submitIdText');
            const loader = document.getElementById('submitIdLoader');

            btn.disabled = true;
            if (text) text.textContent = "Checking...";
            if (loader) loader.classList.remove('hidden');

            try {
                if (!auth.currentUser) await signInAnonymously(auth);

                const membersRef = collection(db, COLLECTION_NAME);
                const mSnap = await getDocs(membersRef);
                currentMember = null;
                
                mSnap.forEach(d => {
                    const data = d.data();
                    const dbEmpId = data.EmpID ? String(data.EmpID).trim() : '';
                    if (dbEmpId === empIdInputVal) {
                        currentMember = { docId: d.id, ...data };
                    }
                });

                if (!currentMember) {
                    showMessage("ไม่พบรหัสพนักงานในฐานข้อมูล", "error");
                    btn.disabled = false;
                    if (text) text.textContent = "ถัดไป";
                    if (loader) loader.classList.add('hidden');
                    return;
                }

                document.getElementById('stepEmployeeId').classList.add('hidden');

                if (currentMember.pin) {
                    if (currentMember.IPAddress === userIP) {
                        const docRef = doc(db, COLLECTION_NAME, currentMember.docId);
                        const newTimes = (currentMember.Times || 0) + 1;
                        await updateDoc(docRef, { Times: newTimes, lastLogin: serverTimestamp() });
                        showMessage("เข้าสู่ระบบอัตโนมัติเรียบร้อย");
                        showMainPage({ ...currentMember, Times: newTimes });
                    } else {
                        document.getElementById('stepEnterPinKeypad').classList.remove('hidden');
                        document.getElementById('loginUserName').textContent = currentMember.FullName;
                        lucide.createIcons();
                    }
                } else {
                    document.getElementById('stepSetupProfile').classList.remove('hidden');
                    document.getElementById('dispName').textContent = currentMember.FullName;
                    document.getElementById('dispGroup').textContent = currentMember.Group;
                    document.getElementById('dispSubGroup').textContent = currentMember.SubGroup || '-';
                    document.getElementById('setPin').value = "";
                    document.getElementById('confirmPin').value = "";
                    validateRegistration();
                }
            } catch (err) {
                showMessage("ฐานข้อมูลขัดข้อง", "error");
            } finally {
                btn.disabled = false;
                if (text) text.textContent = "ถัดไป";
                if (loader) loader.classList.add('hidden');
                lucide.createIcons();
            }
        };

        const validateRegistration = () => {
            const p1 = document.getElementById('setPin').value;
            const p2 = document.getElementById('confirmPin').value;
            const regBtn = document.getElementById('confirmRegBtn');
            if (p1.length === 6 && p2.length === 6 && p1 === p2) {
                regBtn.disabled = false;
            } else {
                regBtn.disabled = true;
            }
        };

        const handleRegistration = async () => {
            const pin = document.getElementById('setPin').value;
            const btn = document.getElementById('confirmRegBtn');
            btn.disabled = true;

            try {
                const docRef = doc(db, COLLECTION_NAME, currentMember.docId);
                const updateData = {
                    pin: pin,
                    Times: 1,
                    ActivatedAt: serverTimestamp(),
                    registrationDate: serverTimestamp(),
                    lastLogin: serverTimestamp(),
                    IPAddress: userIP
                };
                await updateDoc(docRef, updateData);
                showMessage("ลงทะเบียนและบันทึก PIN สำเร็จ");
                showMainPage({ ...currentMember, ...updateData, Times: 1 });
            } catch (e) {
                showMessage("บันทึกข้อมูลล้มเหลว", "error");
                btn.disabled = false;
            }
        };

        const handlePinVerification = async () => {
            if (inputPinValue.length !== 6) {
                showMessage("กรุณาระบุ PIN ให้ครบ 6 หลัก", "error");
                return;
            }

            if (String(inputPinValue) === String(currentMember.pin)) {
                const btn = document.getElementById('savePinLoginBtn');
                btn.disabled = true;
                try {
                    const docRef = doc(db, COLLECTION_NAME, currentMember.docId);
                    const newTimes = (currentMember.Times || 0) + 1;
                    await updateDoc(docRef, { Times: newTimes, lastLogin: serverTimestamp() });
                    showMessage("ยืนยันตัวตนสำเร็จ");
                    showMainPage({ ...currentMember, Times: newTimes });
                } catch (e) {
                    showMainPage(currentMember);
                }
            } else {
                showMessage("รหัส PIN ไม่ถูกต้อง กรุณาลองใหม่", "error");
                inputPinValue = "";
                updatePinDots();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                isAuthReady = true;
                document.getElementById('globalLoader').classList.add('hidden');
                document.getElementById('landingPage').classList.remove('hidden');
            }
        });

        const startApp = async () => {
            if (window.location.protocol === 'file:') {
                alert("กรุณารันผ่าน Server");
                return;
            }

            await fetchIP();

            try {
                await signInAnonymously(auth);
            } catch (e) { 
                isAuthReady = true;
                document.getElementById('globalLoader').classList.add('hidden');
                document.getElementById('landingPage').classList.remove('hidden');
            }

            // Event Binding
            document.getElementById('openModalBtn').onclick = () => {
                document.getElementById('regModalBackdrop').classList.remove('hidden');
                document.getElementById('stepEmployeeId').classList.remove('hidden');
                document.getElementById('stepSetupProfile').classList.add('hidden');
                document.getElementById('stepEnterPinKeypad').classList.add('hidden');
            };
            
            document.getElementById('cancelBtn').onclick = closeRegModal;
            document.getElementById('cancelSetupBtn').onclick = closeRegModal;
            document.getElementById('closeModalIconBtn').onclick = closeRegModal;
            document.getElementById('closeKeypadBtn').onclick = closeRegModal;
            
            document.getElementById('submitIdBtn').onclick = handleIdSubmission;
            document.getElementById('confirmRegBtn').onclick = handleRegistration;
            document.getElementById('savePinLoginBtn').onclick = handlePinVerification;
            
            document.getElementById('logoutBtn').onclick = () => location.reload();

            document.getElementById('setPin').oninput = validateRegistration;
            document.getElementById('confirmPin').oninput = validateRegistration;

            const empInput = document.getElementById('EmpID');
            if (empInput) {
                empInput.oninput = (e) => {
                    let val = e.target.value.replace(/\D/g, '').substring(0, 5);
                    e.target.value = val;
                    document.getElementById('submitIdBtn').disabled = val.length !== 5;
                };
            }

            lucide.createIcons();
        };

        startApp();
    </script>
</body>
</html>
