<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISC Personality System</title>
    <!-- Google Fonts: Kanit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
        }
        /* Custom animations for modal */
        .modal-enter {
            animation: fadeIn 0.2s ease-out, zoomIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0.95); }
            to { transform: scale(1); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center m-0 p-0 text-gray-800">

    <!-- Top Fixed Color Bar -->
    <div class="fixed top-0 left-0 right-0 h-[13px] flex z-50">
        <div class="flex-1 bg-green-600"></div>
        <div class="flex-1 bg-red-500"></div>
        <div class="flex-1 bg-cyan-500"></div>
        <div class="flex-1 bg-yellow-500"></div>
    </div>

    <!-- Main Container -->
    <div class="w-full max-w-[500px] flex flex-col items-center bg-white min-h-screen pb-24 pt-[13px]">
        
        <!-- Image Area -->
        <div class="relative w-full select-none">
            <!-- Main Image Display -->
            <img 
                src="https://firebasestorage.googleapis.com/v0/b/faifah-ttb.appspot.com/o/disc%2Fdisc.jpg?alt=media&token=328a617d-07b1-419b-bc5d-00a85dc455e2" 
                alt="DISC Chart"
                class="w-full h-auto block"
            >

            <!-- Interactive Overlay -->
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="relative w-[75%] aspect-square mt-[28%] grid grid-cols-2 grid-rows-2 z-10">
                    <button 
                        onclick="openModal('D')" 
                        class="rounded-tl-full hover:bg-black/5 active:bg-black/10 transition-all cursor-pointer focus:outline-none"
                    ></button>
                    <button 
                        onclick="openModal('i')" 
                        class="rounded-tr-full hover:bg-black/5 active:bg-black/10 transition-all cursor-pointer focus:outline-none"
                    ></button>
                    <button 
                        onclick="openModal('C')" 
                        class="rounded-bl-full hover:bg-black/5 active:bg-black/10 transition-all cursor-pointer focus:outline-none"
                    ></button>
                    <button 
                        onclick="openModal('S')" 
                        class="rounded-br-full hover:bg-black/5 active:bg-black/10 transition-all cursor-pointer focus:outline-none"
                    ></button>
                </div>
            </div>
        </div>

        <!-- Registration Section -->
        <div class="w-full px-8 py-12 flex flex-col items-center space-y-5">
            <button 
                onclick="handleRegistration()"
                class="w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-2 shadow-md transition-all active:scale-[0.97]"
            >
                <i data-lucide="user-plus" class="w-5 h-5"></i>
                <span>ลงทะเบียน</span>
            </button>
            <p class="text-[11px] text-gray-400 text-center leading-relaxed max-w-[80%]">
                กรุณาลงทะเบียนเพื่อบันทึกข้อมูลและดูประวัติการทดสอบ<br>ข้อมูลของคุณจะถูกจัดเก็บไว้อย่างปลอดภัย
            </p>
        </div>
    </div>

    <!-- Bottom Fixed Color Bar -->
    <div class="fixed bottom-0 left-0 right-0 h-[13px] flex z-50">
        <div class="flex-1 bg-green-600"></div>
        <div class="flex-1 bg-red-500"></div>
        <div class="flex-1 bg-cyan-500"></div>
        <div class="flex-1 bg-yellow-500"></div>
    </div>

    <!-- Modal Backdrop -->
    <div id="modalBackdrop" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm hidden" onclick="event.target === this && closeModal()">
        
        <!-- Modal Content -->
        <div id="modalContent" class="bg-white w-full max-w-[400px] rounded-[2.5rem] shadow-2xl overflow-hidden modal-enter">
            <!-- Header Area -->
            <div id="modalHeader" class="p-8 text-white flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md" id="iconContainer"></div>
                    <h2 id="modalTitle" class="text-2xl font-bold tracking-tight"></h2>
                </div>
                <button onclick="closeModal()" class="hover:bg-white/20 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <!-- Body Area -->
            <div class="p-8 space-y-6">
                <p id="modalDescription" class="text-gray-700 leading-relaxed text-lg font-medium"></p>
                
                <div class="space-y-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em]">ลักษณะเด่นหลัก</p>
                    <div id="traitsContainer" class="grid grid-cols-1 gap-3"></div>
                </div>

                <button 
                    id="closeBtn"
                    onclick="closeModal()"
                    class="w-full py-4 rounded-2xl font-bold text-white shadow-lg mt-4 transition-all active:scale-95"
                >
                    ปิด
                </button>
            </div>
        </div>
    </div>

    <script>
        const discData = {
            D: {
                title: "DOMINANCE (D)",
                colorClass: "bg-green-600",
                lightColorClass: "bg-green-50",
                textColorClass: "text-green-600",
                description: "เน้นผลลัพธ์ ความรวดเร็ว และความท้าทาย เป็นคนที่มีความมั่นใจในตัวเองสูง กล้าตัดสินใจ และชอบควบคุมสถานการณ์",
                traits: ["เน้นเป้าหมาย (Results)", "กล้าท้าทาย (Daring)", "ตัดสินใจเร็ว (Direct)", "มั่นใจในตนเอง (Self-confident)"],
                icon: "target"
            },
            i: {
                title: "INFLUENCE (i)",
                colorClass: "bg-red-500",
                lightColorClass: "bg-red-50",
                textColorClass: "text-red-500",
                description: "เน้นการสร้างปฏิสัมพันธ์ ความกระตือรือร้น และการทำงานร่วมกัน เป็นคนสนุกสนาน มีมนุษยสัมพันธ์ดี ชอบสร้างแรงบันดาลใจ",
                traits: ["มีเสน่ห์ (Charming)", "กระตือรือร้น (Enthusiastic)", "มองโลกแง่ดี (Optimistic)", "ชอบเข้าสังคม (Social)"],
                icon: "star"
            },
            S: {
                title: "STEADINESS (S)",
                colorClass: "bg-cyan-500",
                lightColorClass: "bg-cyan-50",
                textColorClass: "text-cyan-500",
                description: "เน้นความมั่นคง การสนับสนุน และความเป็นทีม เป็นคนใจเย็น รับฟังเก่ง ชอบช่วยเหลือผู้อื่น และไม่ชอบความขัดแย้ง",
                traits: ["มีความอดทน (Patient)", "ถ่อมตัว (Humble)", "เป็นผู้สนับสนุน (Supportive)", "จริงใจ (Sincere)"],
                icon: "heart"
            },
            C: {
                title: "CONSCIENTIOUS (C)",
                colorClass: "bg-yellow-500",
                lightColorClass: "bg-yellow-50",
                textColorClass: "text-yellow-600",
                description: "เน้นความถูกต้อง แม่นยำ และตรรกะเหตุผล เป็นคนละเอียดรอบคอบ ทำงานอย่างมีระบบ ยึดมั่นในมาตรฐานที่สูง",
                traits: ["วิเคราะห์เก่ง (Analytical)", "มีระเบียบ (Systematic)", "ใช้เหตุผล (Logical)", "แม่นยำ (Accurate)"],
                icon: "calculator"
            }
        };

        function openModal(type) {
            const data = discData[type];
            const backdrop = document.getElementById('modalBackdrop');
            const header = document.getElementById('modalHeader');
            const title = document.getElementById('modalTitle');
            const description = document.getElementById('modalDescription');
            const traitsContainer = document.getElementById('traitsContainer');
            const iconContainer = document.getElementById('iconContainer');
            const closeBtn = document.getElementById('closeBtn');

            title.textContent = data.title;
            description.textContent = data.description;
            header.className = `p-8 text-white flex justify-between items-center ${data.colorClass}`;
            closeBtn.className = `w-full py-4 rounded-2xl font-bold text-white shadow-lg mt-4 transition-all active:scale-95 ${data.colorClass}`;
            iconContainer.innerHTML = `<i data-lucide="${data.icon}" class="w-8 h-8 text-white"></i>`;
            
            traitsContainer.innerHTML = '';
            data.traits.forEach(trait => {
                const div = document.createElement('div');
                div.className = `${data.lightColorClass} px-5 py-3 rounded-2xl flex items-center gap-4 border border-transparent shadow-sm`;
                div.innerHTML = `
                    <div class="w-2.5 h-2.5 rounded-full ${data.colorClass}"></div>
                    <span class="${data.textColorClass} font-bold text-base">${trait}</span>
                `;
                traitsContainer.appendChild(div);
            });
            
            backdrop.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.add('hidden');
        }

        function handleRegistration() {
            const empId = window.prompt("กรุณากรอกรหัสพนักงานของคุณเพื่อลงทะเบียน:");
            if (empId) {
                console.log("Registered with ID:", empId);
            }
        }

        window.onload = () => {
            lucide.createIcons();
        };
    </script>
</body>
</html>
